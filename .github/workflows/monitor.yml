name: movie-ticket-monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run monitor
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python monitor.py
      - name: Commit state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "movie-monitor-bot"
            git config user.email "bot@users.noreply.github.com"
            git add state.json
            git commit -m "chore: state $(date -u +%FT%TZ)"
            git push
          fi
