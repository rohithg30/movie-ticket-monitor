movie:
  title: "Jana Nayagan"
  city: "chennai"

target_theatres:
  # Priority order: first match on a given date wins.
  # Lower-priority theatres are NOT emailed for the same date once a
  # higher-priority one has been notified.
  - name_contains: "PVR"
    subname_contains: "Grand Mall"
  - name_contains: "INOX"
    subname_contains: "Phoenix"
  - name_contains: "PVR"
    subname_contains: "Aerohub"

showtime:
  # First show of the day, must start before this time (24h format).
  time_before: "12:00"

tickets:
  count: 5
  seats_together: true
  row_priority: ["A", "B", "C", "D"]

date_range:
  # Jana Nayagan releases 2026-07-23. Advance booking typically opens 2-5
  # days before release. Range covers release day + first week.
  start: "2026-07-19"
  end:   "2026-07-31"

notify:
  email: "rohithg302002@gmail.com"
  from:  "onboarding@resend.dev"

polling:
  # Each GitHub Actions run polls this many times. Since we now go through
  # ScraperAPI (free tier: 5000 credits/mo), we run 1 poll per cron tick
  # to conserve credits. Cron itself fires every 15 min (see workflow).
  checks_per_run: 1
  sleep_seconds: 0
